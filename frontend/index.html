<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area de Login</title>
    <link rel="stylesheet" href="estilos/celulares.css" media="all">
    <script src="https://kit.fontawesome.com/ee9b555772.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="estilos/desktop.css" media="screen and (min-width:800px)">
</head>
<body>
    <header>

    </header>
    <main>
        <section id="login" class="ativo">
            <article class="imagem" id="imginicial">
            </article>
            <article id="bemvindo">
                <h1>Bem-vindo</h1>
            </article>
            <article class="formulario" id="login1">
                <p id="mensagemlogin"></p>
                <label for="lemail"><i class="fa-regular fa-envelope"></i></label>
                <input type="text" name="lemail" id="lemail" placeholder="E-mail">

                <label for="lsenha"><i class="fa-solid fa-lock"></i></label>
                <input type="text" name="lsenha" id="lsenha" placeholder="Senha">
                <button id="entrar">Entrar</button>
                <b id="btncriar" >Criar conta</b>
            </article>
        </section>
        <section id="criarlogin">
            <article class="imagem" id="imgcriar">

            </article>
            <article id="cadastrar">
                <H1>Cadastro</H1>
            </article>
            <article class="formulario" id="cadastro">
                <label for="cnome"><i class="fa-solid fa-user"></i></label>
                <input type="text" name="cnome" id="cnome" placeholder="Nome">
                <p id="mensagemn"></p>

                <label for="cemail"><i class="fa-regular fa-envelope"></i></label>
                <input type="text" name="cemail" id="cemail" placeholder="E-mail">

                <p id="mensageme"></p>

                <label for="csenha"><i class="fa-solid fa-lock"></i></label>
                <input type="text" name="csenha" id="csenha" placeholder="Senha">

                <p id="mensagems"></p>

                <label for="casenha"><i class="fa-solid fa-lock"></i></label>
                <input type="text" name="casenha" id="casenha" placeholder="Confirmar senha">

                <p id="mensagemcs"></p>
                

                <button id="registro">Registrar</button>

                <p id="mensagemfeito"></p>

                <b id="btnvoltar">voltar</b>
                
                
                
                
                
            </article>
        </section>
    </main>
    <footer>

    </footer>
    <script src="codigo/script.js"></script>
</body>
</html>
